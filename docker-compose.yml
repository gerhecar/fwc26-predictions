services:
  mysql:
    image: mysql:8.0
    platform: linux/amd64
    container_name: fwc26-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: fwc26
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./scripts/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

  app:
    build: .
    platform: linux/amd64
    container_name: fwc26-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: "3306"
      MYSQL_USER: root
      MYSQL_PASSWORD: root
      MYSQL_DATABASE: fwc26
      NODE_ENV: production
    depends_on:
      mysql:
        condition: service_healthy
    entrypoint: ["sh", "scripts/docker-start.sh"]

volumes:
  mysql_data:
